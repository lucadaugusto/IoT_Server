# MODO AULA: Acesso anônimo habilitado — qualquer dispositivo conecta sem senha.
# Para produção, troque allow_anonymous para false e configure password_file.

listener 1883
allow_anonymous true

listener 9001
protocol websockets
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

