# SEGURANÇA: Autenticação obrigatória por usuário/senha.
# O arquivo de senhas é gerado automaticamente pelo docker-compose
# a partir das variáveis MQTT_USER e MQTT_PASSWORD definidas no .env

# --- Listener MQTT padrão (TCP) ---
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

# --- Listener WebSocket (opcional) ---
listener 9001
protocol websockets
allow_anonymous false
password_file /mosquitto/config/passwd

# --- Persistência de mensagens ---
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
listener 1883
allow_anonymous true

listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
