version: "3.9"

# Copie o arquivo .env.example para .env e preencha as variáveis antes de executar:
#   cp .env.example .env

services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    command: >
      sh -c "mosquitto_passwd -b -c /mosquitto/config/passwd $$MQTT_USER $$MQTT_PASSWORD &&
             mosquitto -c /mosquitto/config/mosquitto.conf"
    ports:
      - "1883:1883"
      - "9001:9001"
    environment:
      - MQTT_USER=${MQTT_USER:-iot_user}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-iot_password}
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    user: "1883:1883"
    restart: unless-stopped
    networks:
      - iot_network

  api_gateway:
    build: .
    container_name: gateway_api
    ports:
      - "8000:8000"
    depends_on:
      - mosquitto
      - mongodb
    environment:
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_USER=${MQTT_USER:-iot_user}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-iot_password}
      - MONGO_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin}@mongodb:27017/
    restart: unless-stopped
    networks:
      - iot_network

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-admin}
    volumes:
      - mongodb_data:/data/db
    restart: always
    networks:
      - iot_network

networks:
  iot_network:
    driver: bridge

volumes:
  mongodb_data:
  mosquitto_data:
  mosquitto_log:

